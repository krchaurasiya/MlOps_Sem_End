name: 🚀 CI/CD – Goa Recommender MLOps

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  DOCKER_IMAGE: goa-recommender
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/goa-recommender

jobs:
  # ─────────────────────────────────────────────
  # Job 1: Lint & Test
  # ─────────────────────────────────────────────
  test:
    name: 🧪 Test & Lint
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip

      - name: 📦 Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-asyncio httpx ruff

      - name: 🔍 Lint with Ruff
        run: ruff check app/ tests/ --output-format=github

      - name: 🧪 Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=app \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short

      - name: 📊 Upload coverage report
        uses: codecov/codecov-action@v4
        if: always()
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ─────────────────────────────────────────────
  # Job 2: Build & Push Docker image
  # ─────────────────────────────────────────────
  build:
    name: 🐳 Build & Push Docker
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: 🛠️ Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🐳 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          target: runtime

      - name: 🔒 Scan image for vulnerabilities (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: 0
          severity: CRITICAL,HIGH

  # ─────────────────────────────────────────────
  # Job 3: Deploy to EC2 (SSH)
  # ─────────────────────────────────────────────
  deploy:
    name: 🌐 Deploy to EC2
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    environment:
      name: production
      url: http://${{ secrets.EC2_HOST }}

    steps:
      - name: ⬇️ Checkout code
        uses: actions/checkout@v4

      - name: 🚢 Deploy via SSH to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            echo "=== Pulling latest image ==="
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

            echo "=== Stopping old containers ==="
            cd ~/goa-recommender
            docker compose down --remove-orphans || true

            echo "=== Updating compose file ==="
            git pull origin main

            echo "=== Starting services ==="
            docker compose up -d --force-recreate

            echo "=== Health check ==="
            sleep 15
            curl -f http://localhost:8000/health || (echo "Health check failed!" && exit 1)

            echo "=== Cleanup old images ==="
            docker image prune -f

            echo "✅ Deployment complete!"

  # ─────────────────────────────────────────────
  # Job 4: Notify on Slack / Email (optional)
  # ─────────────────────────────────────────────
  notify:
    name: 📢 Notify Deployment Status
    runs-on: ubuntu-latest
    needs: [test, build, deploy]
    if: always()

    steps:
      - name: 📣 Deployment summary
        run: |
          echo "============================================"
          echo "  CI/CD Pipeline Summary"
          echo "============================================"
          echo "  Tests    : ${{ needs.test.result }}"
          echo "  Build    : ${{ needs.build.result }}"
          echo "  Deploy   : ${{ needs.deploy.result }}"
          echo "  Repo     : ${{ github.repository }}"
          echo "  Commit   : ${{ github.sha }}"
          echo "  Branch   : ${{ github.ref_name }}"
          echo "============================================"
