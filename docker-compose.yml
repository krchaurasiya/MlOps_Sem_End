version: "3.9"

services:
  # ─────────────────────────────────────────────
  # FastAPI Backend
  # ─────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: goa-recommender-api
    image: goa-recommender:latest
    ports:
      - "8000:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - MODEL_PATH=/app/model/rank_model.pkl
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - model_data:/app/model
    depends_on:
      mlflow:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - goa-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─────────────────────────────────────────────
  # MLflow Tracking Server
  # ─────────────────────────────────────────────
  mlflow:
    image: python:3.10-slim
    container_name: goa-mlflow
    working_dir: /mlflow
    command: >
      bash -c "pip install mlflow --quiet &&
               mlflow server
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts
               --host 0.0.0.0
               --port 5000"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    networks:
      - goa-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 40s

  # ─────────────────────────────────────────────
  # Nginx – serves the frontend HTML
  # ─────────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: goa-frontend
    ports:
      - "80:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - goa-net
    restart: unless-stopped

volumes:
  model_data:
  mlflow_data:

networks:
  goa-net:
    driver: bridge
