<!DOCTYPE html>
<html>
<head>
    <title>Goa AI Recommender</title>
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            margin: 0;
            color: white;
        }

        .container {
            max-width: 500px;
            margin: 60px auto;
            background: white;
            color: black;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0px 10px 30px rgba(0,0,0,0.2);
            text-align: center;
        }

        h2 {
            margin-bottom: 20px;
        }

        input, select {
            width: 90%;
            padding: 10px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
        }

        button {
            width: 95%;
            padding: 12px;
            background: #0072ff;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background: #005edb;
        }

        .result-card {
            margin-top: 20px;
            padding: 15px;
            border-radius: 10px;
            background: #f1f1f1;
            display: none;
        }

        .loading {
            display: none;
            margin-top: 10px;
            color: #0072ff;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>🌴 Goa AI Recommender</h2>

    <input id="rating" type="number" step="0.1" placeholder="⭐ Rating (e.g. 4.5)">
    <input id="reviews" type="number" placeholder="👥 Review Count">

    <select id="category">
        <option value="">Select Category</option>
        <option value="beach">Beach</option>
        <option value="food">Food</option>
        <option value="nightlife">Nightlife</option>
        <option value="temple">Temple</option>
        <option value="nature">Nature</option>
    </select>

    <input id="text" placeholder="📝 Describe place (e.g. sunset beach party)">

    <button onclick="predict()">🚀 Predict Popularity</button>

    <div class="loading" id="loading">⏳ Predicting...</div>

    <div class="result-card" id="resultCard">
        <h3>📊 Prediction Result</h3>
        <p id="result"></p>
    </div>
</div>

<script>
async function predict() {

    document.getElementById("loading").style.display = "block";
    document.getElementById("resultCard").style.display = "none";

    let res = await fetch("http://127.0.0.1:8000/predict", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            rating: parseFloat(document.getElementById("rating").value),
            review_count: parseInt(document.getElementById("reviews").value),
            category: document.getElementById("category").value,
            text: document.getElementById("text").value
        })
    });

    let data = await res.json();

    document.getElementById("loading").style.display = "none";
    document.getElementById("resultCard").style.display = "block";

    document.getElementById("result").innerText = 
        "🔥 Popularity Score: " + data.prediction;
}
</script>

</body>
</html>
